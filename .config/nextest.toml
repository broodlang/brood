# cargo-nextest configuration. Drives `make test` (and any bare `cargo nextest run`).
#
# Why nextest here: nextest runs every test case in its OWN process, so Brood's
# signature failure mode — an uncatchable SIGSEGV from a green-process coroutine
# stack overflow (see docs/devlog.md, the brood-debug skill) — is contained to the
# single offending case instead of aborting the whole test binary and taking every
# sibling case down with it. It also gives a true per-CASE timeout (below), which
# plain `cargo test`/libtest cannot.

[profile.default]
# Per-test-case hard cap. nextest prints a "slow" warning every `period`, and after
# `terminate-after` periods it kills the test (SIGTERM, then SIGKILL on its own grace
# timer). 60s × 2 = a heads-up at 1 min and a hard kill at 2 min — so no single test
# can exceed 2 minutes, while a hung/segfaulting case is reported and the rest of the
# run continues.
slow-timeout = { period = "60s", terminate-after = 2 }

# Real-TCP distribution tests (`crates/cli/tests/distribution.rs`) spin two real
# `brood` child processes that bind/connect over loopback. Under nextest, each test
# case runs in its OWN process, so the test file's process-global `port_lock()`
# mutex serialises NOTHING across cases — all ~20 would otherwise run at once,
# racing `free_port()` for the same just-freed port and saturating every core with
# simultaneous node pairs, which made a few flake on a ~5s connect/receive timeout
# under full-workspace load. Pin them to a single-threaded test group so nextest
# runs them one at a time — the cross-process equivalent of `port_lock` (the Unix
# tests share the group too; harmless, they're fast).
[test-groups]
real-tcp = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'binary(distribution)'
test-group = 'real-tcp'

# `brood_suite_passes` (tests/suite.rs) runs the ENTIRE in-language suite (~1200
# cases) inside ONE nextest case, so the 120s default cap is the wrong scale: under
# a full `make test` it competes with the rest of the workspace for cores and
# legitimately needs longer, and its own inner per-test ceiling (`*test-timeout-ms*`,
# 120s in std/test.blsp) must be able to fire *before* nextest kills the wrapper.
# Give this one binary a 300s cap (60s × 5) so the inner timeout stays the
# meaningful one; every other test keeps the 120s default above.
[[profile.default.overrides]]
filter = 'binary(suite)'
slow-timeout = { period = "60s", terminate-after = 5 }
